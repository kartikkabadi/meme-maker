name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          # GitHub deprecated and retired macos-13 (the last Intel "macos-N"
          # image); macos-15-intel is the current supported x64 runner label
          # and macos-15 the current arm64 label.
          - os: macos-15-intel
            target: macos-x64
          - os: macos-15
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: npm prune --omit=dev --no-audit --no-fund
      - name: Build platform tarball
        run: |
          STAGE=$(mktemp -d)
          mkdir "$STAGE/meme-maker"
          cp -R dist assets node_modules package.json LICENSE NOTICE README.md CHANGELOG.md install.sh "$STAGE/meme-maker/"
          tar -czf "meme-maker-${{ matrix.target }}.tar.gz" -C "$STAGE" meme-maker
      - uses: actions/upload-artifact@v7
        with:
          name: meme-maker-${{ matrix.target }}
          path: meme-maker-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Verify all platform artifacts are present
        run: |
          missing=0
          for target in linux-x64 macos-x64 macos-arm64; do
            if [ ! -s "meme-maker-$target.tar.gz" ]; then
              echo "::error::Missing artifact meme-maker-$target.tar.gz"
              missing=1
            fi
          done
          exit "$missing"
      - name: Build source tarball
        run: |
          STAGE="agent-meme-maker-$GITHUB_REF_NAME"
          mkdir "$STAGE"
          cp -r src assets scripts ui test package.json package-lock.json tsconfig.json vitest.config.ts eslint.config.js LICENSE NOTICE README.md CHANGELOG.md install.sh "$STAGE/"
          tar -czf "$STAGE.tar.gz" "$STAGE"
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver "$" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $VERSION" > release-notes.md
          fi
      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            meme-maker-linux-x64.tar.gz \
            meme-maker-macos-x64.tar.gz \
            meme-maker-macos-arm64.tar.gz \
            "agent-meme-maker-$GITHUB_REF_NAME.tar.gz" \
            install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
