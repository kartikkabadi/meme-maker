name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - name: Build release tarball
        run: |
          STAGE="agent-meme-maker-$GITHUB_REF_NAME"
          mkdir "$STAGE"
          cp -r dist assets package.json package-lock.json LICENSE NOTICE README.md CHANGELOG.md "$STAGE/"
          tar -czf "$STAGE.tar.gz" "$STAGE"
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver "$" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $VERSION" > release-notes.md
          fi
      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "agent-meme-maker-$GITHUB_REF_NAME.tar.gz" \
            scripts/install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
